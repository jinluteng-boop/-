<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>二建建筑实务 刷题系统</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>二建建筑实务 高频题库</h1>
  <div class="progress">第 <span id="current">1</span> / <span id="total">0</span> 题</div>

  <div class="qbox">
    <div id="question"></div>
  </div>

  <div class="opts" id="options"></div>

  <div class="ansbox" id="answerBox"></div>

  <div class="btns">
    <button onclick="prevQuestion()">上一题</button>
    <button onclick="nextQuestion()">下一题</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
