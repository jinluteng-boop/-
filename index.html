<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二建建筑实务 多套模拟考试</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>二建建筑实务 多套模拟考试系统</h1>
        <div class="desc">满分120分 | 合格线72分 | 单选20+多选10+案例4</div>

        <div class="select-box">
            <label>选择试卷：</label>
            <select id="paperSelect" onchange="changePaper()">
                <option value="1">第一套</option>
                <option value="2">第二套</option>
                <option value="3">第三套</option>
            </select>
        </div>

        <div class="tab-wrap">
            <div class="tab active" onclick="switchTab(0)">单选题</div>
            <div class="tab" onclick="switchTab(1)">多选题</div>
            <div class="tab" onclick="switchTab(2)">案例题</div>
        </div>

        <div id="tab0" class="content">
            <div id="singleQBox"></div>
            <div class="btn-group">
                <button onclick="prevSingle()">上一题</button>
                <button onclick="nextSingle()">下一题</button>
            </div>
        </div>

        <div id="tab1" class="content hide">
            <div id="multiQBox"></div>
            <div class="btn-group">
                <button onclick="prevMulti()">上一题</button>
                <button onclick="nextMulti()">下一题</button>
            </div>
        </div>

        <div id="tab2" class="content hide">
            <div id="caseQBox"></div>
            <div class="btn-group">
                <button onclick="prevCase()">上一题</button>
                <button onclick="nextCase()">下一题</button>
            </div>
        </div>

        <div class="btn-group bottom-btn">
            <button class="score-btn" onclick="calcTotalScore()">提交打分</button>
            <button class="reset-btn" onclick="resetAllAnswer()">重置答案</button>
        </div>

        <div id="resultBox" class="result-box hide"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
